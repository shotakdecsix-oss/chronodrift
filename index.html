// Joystick zone: bottom-left corner
function getJoyBounds() {
  const el = document.getElementById('joystick');
  const r = el.getBoundingClientRect();
  return { cx: r.left + r.width/2, cy: r.top + r.height/2, radius: r.width/2 + 30 };
}

// touchstart: passive:true so buttons still fire click events
document.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (t.target.closest('button')) continue; // let buttons work normally
    const joy = getJoyBounds();
    const dx = t.clientX - joy.cx, dy = t.clientY - joy.cy;
    if (Math.sqrt(dx*dx+dy*dy) < joy.radius && joyId === null) {
      joyId = t.identifier; joyActive = true;
      joyCenterX = joy.cx; joyCenterY = joy.cy;
    } else if (camTouchId === null) {
      camTouchId = t.identifier; camLastX = t.clientX; camLastY = t.clientY;
    }
  }
}, { passive: true });

// touchmove: passive:false to prevent page scroll during gameplay
document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) {
      const dx = t.clientX - joyCenterX;
      const dy = t.clientY - joyCenterY;
      const r2 = Math.sqrt(dx*dx+dy*dy);
      const maxR = 36; // 50pxでは端まで届きにくく最大速度が出なかった → 36pxで全開扱い
      const cx = r2 > maxR ? dx/r2*maxR : dx;
      const cy = r2 > maxR ? dy/r2*maxR : dy;
      joystickKnob.style.left = (50 + cx / 1.3) + '%'; // px→親幅130pxの%変換。全開(36px)でほぼ縁に届く
      joystickKnob.style.top  = (50 + cy / 1.3) + '%';
      joyOx = cx / maxR;
      joyOz = cy / maxR;
    } else if (t.identifier === camTouchId) {
      camYaw   -= (t.clientX - camLastX) * 0.005;
      camPitch -= (t.clientY - camLastY) * 0.004;
      camPitch = Math.max(-0.3, Math.min(1.4, camPitch));
      camLastX = t.clientX; camLastY = t.clientY;
    }
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) {
      joyActive = false; joyId = null; joyOx = 0; joyOz = 0;
      joystickKnob.style.left = '50%'; joystickKnob.style.top = '50%';
    }
    if (t.identifier === camTouchId) camTouchId = null;
  }
}, { passive: true });

document.addEventListener('touchcancel', () => {
  joyActive = false; joyId = null; joyOx = 0; joyOz = 0;
  joystickKnob.style.left = '50%'; joystickKnob.style.top = '50%';
  camTouchId = null;
});

// ======= COLLISION =======
const tempBox = new THREE.Box3();
const playerRadius = 0.25; // small radius so player fits on narrow roads

// yBase 省略時はプレイヤーの現在高さで判定。
// 【バグ修正】以前は y=0〜3 固定だったため、標高3m超の場所では建物AABB
// (地形標高から始まる)と一切交差せず、当たり判定が実質無効だった。
// 地面が平坦だった頃は偶然動いており、標高反映+ELEV_SCALE増で顕在化した。
function wouldCollide(nx, nz, yBase) {
  const y0 = (yBase !== undefined) ? yBase : player.position.y;
  tempBox.set(
    new THREE.Vector3(nx - playerRadius, y0 + 0.1, nz - playerRadius),
    new THREE.Vector3(nx + playerRadius, y0 + 2.4, nz + playerRadius)
  );
  // 空間グリッドで近傍セルのみ照合(ボックスは重なる全セルに登録済み)
  const x0 = Math.floor((nx - playerRadius) / COLL_CELL), x1 = Math.floor((nx + playerRadius) / COLL_CELL);
  const z0 = Math.floor((nz - playerRadius) / COLL_CELL), z1 = Math.floor((nz + playerRadius) / COLL_CELL);
  for (let gx = x0; gx <= x1; gx++) for (let gz = z0; gz <= z1; gz++) {
    const arr = collGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const box of arr) if (box.intersectsBox(tempBox)) return true;
  }
  return false;
}

// その地点で立てる床の高さ(地形 or 足元以下にある建物の屋根の高い方)
function floorHeightAt(x, z, fromY) {
  let fy = getGroundY(x, z) + 0.35;
  const arr = collGrid.get(Math.floor(x / COLL_CELL) + ',' + Math.floor(z / COLL_CELL));
  if (arr) for (const b of arr) {
    if (x >= b.min.x && x <= b.max.x && z >= b.min.z && z <= b.max.z) {
      const top = b.max.y + 0.35;
      // 現在高さ+0.5以下の屋根だけを床候補に(下から突き上げない)
      if (b.max.y <= fromY + 0.5 && top > fy) fy = top;
    }
  }
  return fy;
}

// ======= TILE-BASED DYNAMIC OSM FETCHING =======
// Each tile is 700m x 700m. When the player enters a new tile, fetch its OSM data.
const OSM_TILE_M = 700;
const fetchedOSMTiles = new Set();
const osmTileQueue = [];
let osmTileFetching = false;
const osmTileFailCount = new Map(); // タイルごとの失敗回数(3回まで再試行)
// 【重要】標高データ+初期OSMのロード完了までタイル取得を止めるゲート。
// 以前は起動直後からタイル取得が走り、標高ロード(約8秒)より先に完了した
// 境界タイルの道路が「平坦な地面の高さ」で生成され、その後地形が持ち上がると
// 地面の下に埋まって「道路がスパッと途切れる」症状になっていた。
// (ミニマップには道路が残るのに3Dでは見えない、という報告と厳密に一致する)
let initialWorldLoaded = false;
const seenOSMWays = new Set();      // 処理済みway ID(タイル境界をまたぐ要素の二重生成防止)
const pendingBuildings = [];        // タイル取得分の建物はフレーム分割して生成
let pendingBuildingIdx = 0;

// Mark tiles that the initial loadOSM already covered (OSM_BOUNDS rectangle)
// タイルが初期範囲に「完全に」含まれる場合のみ取得済み扱いにする。
// 以前は境界に部分的にかかるタイルも取得済み扱いになり、範囲外部分が
// 永久に歯抜けになっていた(境界沿いで道路・建物が途切れる主因)。
// 重複ロードは seenOSMWays のway ID重複排除で防ぐ。
(function markInitialTiles() {
  const pt1 = latLonToXZ(OSM_BOUNDS.minLat, OSM_BOUNDS.minLon);
  const pt2 = latLonToXZ(OSM_BOUNDS.maxLat, OSM_BOUNDS.maxLon);
  const x0 = Math.min(pt1.x, pt2.x), x1 = Math.max(pt1.x, pt2.x);
  const z0 = Math.min(pt1.z, pt2.z), z1 = Math.max(pt1.z, pt2.z);
  for (let tx = Math.floor(x0/OSM_TILE_M); tx <= Math.floor(x1/OSM_TILE_M); tx++)
    for (let tz = Math.floor(z0/OSM_TILE_M); tz <= Math.floor(z1/OSM_TILE_M); tz++) {
      if (tx*OSM_TILE_M >= x0 && (tx+1)*OSM_TILE_M <= x1 &&
          tz*OSM_TILE_M >= z0 && (tz+1)*OSM_TILE_M <= z1)
        fetchedOSMTiles.add(`${tx},${tz}`);
    }
})();

function processTileData(data) {
  if (!data || !data.elements) return;
  // Roads
  data.elements.forEach(el => {
    if (el.type !== 'way' || !el.geometry || el.geometry.length < 2) return;
    if (seenOSMWays.has(el.id)) return; // 隣接タイル/初期ロードで処理済み
    const tags = el.tags || {};
    if (tags.highway) {
      const hw = tags.highway;
      const width = hw==='trunk'||hw==='primary' ? 8 : hw==='secondary' ? 6 : hw==='tertiary'||hw==='residential' ? 4 : 2.5;
      const type = (hw==='trunk'||hw==='primary'||hw==='secondary'||hw==='tertiary') ? hw : 'road';
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, width, type);
      }
    }
    if (tags.railway === 'rail') {
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, 4, 'railway');
      }
    }
    if (tags.waterway) {
      const ww = tags.waterway === 'river' ? 8 : 3;
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, ww, 'water');
      }
    }
  });
  // 公園・水域・田畑・森
  data.elements.forEach(el => {
    if (el.type === 'way' && el.id && seenOSMWays.has(el.id)) return;
    handleAreaFeature(el);
  });
  // Buildings — 直接生成せずキューに積み、フレーム分割して生成する
  // (以前は1タイル分の建物を1フレームで同期生成し、大きなカクつきの原因だった)
  data.elements.forEach(el => {
    if (el.type !== 'way' || !el.geometry || el.geometry.length < 4) return;
    if (seenOSMWays.has(el.id)) return;
    const tags = el.tags || {};
    if (!tags.building) return;
    const pts = el.geometry.map(g => latLonToXZ(g.lat, g.lon));
    let cx=0, cz=0;
    pts.forEach(p => { cx+=p.x; cz+=p.z; });
    cx/=pts.length; cz/=pts.length;
    let maxDx=0, maxDz=0;
    pts.forEach(p => { maxDx=Math.max(maxDx,Math.abs(p.x-cx)); maxDz=Math.max(maxDz,Math.abs(p.z-cz)); });
    const w=Math.max(maxDx*2,2), d=Math.max(maxDz*2,2);
    const style = getBuildingStyle(tags);
    const levels = parseInt(tags['building:levels']) || 1+Math.floor(Math.random()*3);
    pendingBuildings.push({ x: cx, z: cz, w, d, h: Math.max(levels*3,3)+Math.random()*2, style });
  });
  // Landuse polygons for chunk system
  data.elements.forEach(el => {
    if (el.type !== 'way' || !el.geometry || el.geometry.length < 4) return;
    if (seenOSMWays.has(el.id)) return;
    const tags = el.tags || {};
    const lu = tags.landuse;
    if (!lu || !['residential','commercial','industrial','retail','mixed_use'].includes(lu)) return;
    const pts = el.geometry.map(g => latLonToXZ(g.lat, g.lon));
    let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
    pts.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z); });
    landusePolygons.push({ pts, lu, minX, maxX, minZ, maxZ });
  });
  // 最後にway IDを記録(カテゴリ別の3パスが終わってから)
  data.elements.forEach(el => { if (el.type === 'way') seenOSMWays.add(el.id); });
}

async function processOSMTileQueue() {
  if (osmTileFetching || osmTileQueue.length === 0) return;
  osmTileFetching = true;
  // プレイヤーに近いタイルを優先(以前はキュー投入順で、進行方向の
  // タイルが後回しになり目の前で道路が途切れたまま待たされていた)
  const ptx = player.position.x / OSM_TILE_M, ptz = player.position.z / OSM_TILE_M;
  osmTileQueue.sort((a, b) =>
    (Math.abs(a.tx + 0.5 - ptx) + Math.abs(a.tz + 0.5 - ptz)) -
    (Math.abs(b.tx + 0.5 - ptx) + Math.abs(b.tz + 0.5 - ptz)));
  const { tx, tz } = osmTileQueue.shift();
  const key = `${tx},${tz}`;
  const worldX0 = tx * OSM_TILE_M, worldZ0 = tz * OSM_TILE_M;
  const ll00 = xzToLatLon(worldX0, worldZ0);
  const ll11 = xzToLatLon(worldX0 + OSM_TILE_M, worldZ0 + OSM_TILE_M);
  const minLat = Math.min(ll00.lat, ll11.lat), maxLat = Math.max(ll00.lat, ll11.lat);
  const minLon = Math.min(ll00.lon, ll11.lon), maxLon = Math.max(ll00.lon, ll11.lon);
  const bb = `${minLat.toFixed(5)},${minLon.toFixed(5)},${maxLat.toFixed(5)},${maxLon.toFixed(5)}`;
  const query = `[out:json][timeout:20];(way["highway"](${bb});way["building"](${bb});way["landuse"~"residential|commercial|industrial|retail|mixed_use|farmland|orchard|meadow|allotments|forest"](${bb});way["leisure"~"park|garden|playground"](${bb});way["natural"~"water|wood"](${bb});way["waterway"~"river|stream|canal"](${bb});way["railway"="rail"](${bb}););out geom;`;
  let failed = false;
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !data.elements) throw new Error('no elements');
    processTileData(data);
    osmTileFailCount.delete(key);
  } catch(e) {
    // 以前は失敗タイルが fetchedOSMTiles に残ったまま二度と再試行されず、
    // レート制限(429)等で永久に歯抜けになっていた → 3回まで再試行
    failed = true;
    const n = (osmTileFailCount.get(key) || 0) + 1;
    osmTileFailCount.set(key, n);
    if (n < 4) fetchedOSMTiles.delete(key); // checkOSMTiles が再度キューに積む
  }
  await new Promise(r => setTimeout(r, failed ? 6000 : 1500)); // 失敗時は長く待ってレート制限回復
  osmTileFetching = false;
  processOSMTileQueue();
}

let _osmCheckFrame = 0;
function checkOSMTiles() {
  if (!initialWorldLoaded) return; // 標高+初期OSMが揃うまで開始しない(高さ競合防止)
  _osmCheckFrame++;
  if (_osmCheckFrame % 60 !== 0) return; // check every ~1s at 60fps
  const px = player.position.x, pz = player.position.z;
  // Check 5x5 tile grid around player (2 tiles in each direction = ~1400m radius)
  for (let dx = -2; dx <= 2; dx++) {
    for (let dz = -2; dz <= 2; dz++) {
      const tx = Math.floor((px + dx * OSM_TILE_M) / OSM_TILE_M);
      const tz = Math.floor((pz + dz * OSM_TILE_M) / OSM_TILE_M);
      const key = `${tx},${tz}`;
      if (!fetchedOSMTiles.has(key)) {
        fetchedOSMTiles.add(key);
        osmTileQueue.push({ tx, tz });
      }
    }
  }
  if (osmTileQueue.length > 0 && !osmTileFetching) processOSMTileQueue();
}

// ======= CHUNK-BASED DYNAMIC BUILDING GENERATION =======
function generateChunk(chunkX, chunkZ) {
  if (landusePolygons.length === 0) return; // OSM not yet loaded
  const key = `${chunkX},${chunkZ}`;
  currentChunkKey = key; // addBuilding が記録に掃除用タグを付ける
  const worldX = chunkX * CHUNK_SIZE;
  const worldZ = chunkZ * CHUNK_SIZE;

  const beforeCount = scene.children.length; // snapshot to track added meshes

  const x0 = worldX, z0 = worldZ, x1 = worldX + CHUNK_SIZE, z1 = worldZ + CHUNK_SIZE;
  // チャンク周辺のポリゴンだけに絞る(以降の判定を軽く)
  const nearAvoid = avoidPolygons.filter(p => !(x1 < p.minX || x0 > p.maxX || z1 < p.minZ || z0 > p.maxZ));
  const inAvoid = (x, z) => nearAvoid.some(p =>
    x >= p.minX && x <= p.maxX && z >= p.minZ && z <= p.maxZ && pointInPolygon(x, z, p.pts));
  const nearLanduse = landusePolygons.filter(p => !(x1 + 30 < p.minX || x0 - 30 > p.maxX || z1 + 30 < p.minZ || z0 - 30 > p.maxZ));
  const inLanduse = (x, z) => nearLanduse.some(p =>
    x >= p.minX && x <= p.maxX && z >= p.minZ && z <= p.maxZ && pointInPolygon(x, z, p.pts));

  // --- 1) 道路沿いの住宅補完(日本の住宅街らしく道路に面して並べる) ---
  // 住宅系landuse内・田畑/森/公園/水域の外・既存建物や道路と非重複、の空き地だけ埋める
  for (const r of minimapRoads) {
    if (r.type !== 'road' && r.type !== 'tertiary') continue;
    if (Math.max(r.x1, r.x2) < x0 - 25 || Math.min(r.x1, r.x2) > x1 + 25 ||
        Math.max(r.z1, r.z2) < z0 - 25 || Math.min(r.z1, r.z2) > z1 + 25) continue;
    const dx = r.x2 - r.x1, dz = r.z2 - r.z1;
    const len = Math.sqrt(dx * dx + dz * dz);
    if (len < 12) continue;
    const px = -dz / len, pz = dx / len;
    for (let s = 6; s < len - 5; s += 13 + Math.random() * 5) {
      for (const side of [-1, 1]) {
        if (Math.random() < 0.25) continue; // 適度に空き地を残す
        const off = (r.rw || 4) / 2 + 5 + Math.random() * 2;
        const hx = r.x1 + dx * (s / len) + px * side * off;
        const hz = r.z1 + dz * (s / len) + pz * side * off;
        if (hx < x0 || hx >= x1 || hz < z0 || hz >= z1) continue; // このチャンク担当分のみ(二重生成防止)
        if (!inLanduse(hx, hz) || inAvoid(hx, hz)) continue;
        const bw = 6.5 + Math.random() * 3.5, bd = 6 + Math.random() * 3;
        if (isOnRoad(hx, hz, bw, bd)) continue;
        if (hasBuildingNearby(hx, hz, Math.max(bw, bd) / 2 + 1.5)) continue;
        const pal = HOUSE_PALETTE[(Math.random() * HOUSE_PALETTE.length) | 0];
        addBuilding(hx, hz, bw, bd, 3.5 + Math.random() * 3.5,
                    { color: pal.w, roofColor: pal.r, type: 'house' });
      }
    }
  }

  // --- 2) 区画内のグリッド充填(道路沿い分ができたのでレートを低減) ---
  for (const poly of nearLanduse) {
    const lu = poly.lu;
    const isRes = lu === 'residential';
    const isCom = lu === 'commercial' || lu === 'retail' || lu === 'mixed_use';
    const step     = isRes ? 22 : isCom ? 24 : 40;
    const fillRate = isRes ? 0.30 : isCom ? 0.55 : 0.45;

    for (let bx = worldX; bx < worldX + CHUNK_SIZE; bx += step) {
      for (let bz = worldZ; bz < worldZ + CHUNK_SIZE; bz += step) {
        if (!pointInPolygon(bx, bz, poly.pts)) continue;
        if (Math.random() > fillRate) continue;
        const jx = bx + (Math.random()-0.5)*step*0.4;
        const jz = bz + (Math.random()-0.5)*step*0.4;
        if (inAvoid(jx, jz)) continue; // 田畑・森・公園・水域は埋めない
        const bw = isRes ? 8+Math.random()*8 : isCom ? 12+Math.random()*16 : 25+Math.random()*25;
        const bd = isRes ? 7+Math.random()*8 : isCom ? 10+Math.random()*14 : 20+Math.random()*20;
        if (isOnRoad(jx, jz, bw, bd)) continue;
        if (hasBuildingNearby(jx, jz, Math.max(bw,bd)/2+2)) continue;
        const bh = isRes ? 4+Math.random()*8 : isCom ? 8+Math.random()*18 : 6+Math.random()*8;
        const style = isRes
          ? { color:0xc8a060, roofColor:0x8a5828, type:'house' }
          : isCom
          ? { color:0xf09050, roofColor:0xb05020, type:'shop' }
          : { color:0x909898, roofColor:0x606868, type:'industrial' };
        addBuilding(jx, jz, bw, bd, bh, style);
      }
    }
  }

  // Store all meshes added during this chunk for future unloading
  const added = scene.children.slice(beforeCount);
  chunkMeshes.set(key, added);
  currentChunkKey = null;
}

let _lastChunkX = null, _lastChunkZ = null;
const chunkGenQueue = [];

function updateChunks() {
  if (landusePolygons.length === 0) return;
  const cx = Math.floor(player.position.x / CHUNK_SIZE);
  const cz = Math.floor(player.position.z / CHUNK_SIZE);

  // Only process when the player enters a new chunk
  if (cx === _lastChunkX && cz === _lastChunkZ) return;
  _lastChunkX = cx; _lastChunkZ = cz;

  // 未生成チャンクをキューに積む(生成自体は1フレーム1個ずつ processChunkQueue で行う。
  // 以前は境界越えの瞬間に複数チャンクを同期生成して大きなカクつきの原因だった)
  for (let dx = -CHUNK_RADIUS; dx <= CHUNK_RADIUS; dx++) {
    for (let dz = -CHUNK_RADIUS; dz <= CHUNK_RADIUS; dz++) {
      const key = `${cx+dx},${cz+dz}`;
      if (!loadedChunks.has(key)) {
        loadedChunks.add(key);
        chunkGenQueue.push({ x: cx+dx, z: cz+dz, key });
      }
    }
  }
  // 近い順に生成(足元が歯抜けのまま遠くが先に生成されるのを防ぐ)
  chunkGenQueue.sort((a,b) => (Math.abs(a.x-cx)+Math.abs(a.z-cz)) - (Math.abs(b.x-cx)+Math.abs(b.z-cz)));

  // Unload distant chunks (geometry + lights freed from GPU)
  const unloadR = CHUNK_RADIUS + 2;
  let removedAny = false;
  for (const [key, meshes] of chunkMeshes.entries()) {
    const [kcx, kcz] = key.split(',').map(Number);
    if (Math.abs(kcx - cx) > unloadR || Math.abs(kcz - cz) > unloadR) {
      meshes.forEach(m => {
        scene.remove(m);
        if (m.geometry) m.geometry.dispose();
      });
      chunkMeshes.delete(key);
      loadedChunks.delete(key); // allow re-generation if player returns
      // 【重要】以前はメッシュだけ消して記録が残っていたため、
      //  - 再訪時に hasBuildingNearby が幽霊建物を検出 → チャンクが空のまま(=途切れ)
      //  - 幽霊の当たり判定(見えない壁)とミニマップ表示も残留
      collisionBoxes = collisionBoxes.filter(b => b.chunkKey !== key);
      minimapBuildings = minimapBuildings.filter(b => b.ck !== key);
      placedBuildings = placedBuildings.filter(b => b.ck !== key);
      removedAny = true;
    }
  }
  if (removedAny) rebuildCollGrid();
}

// 1フレームに1チャンクだけ生成するフレーム分割処理
function processChunkQueue() {
  if (chunkGenQueue.length === 0) return;
  const c = chunkGenQueue.shift();
  const ccx = Math.floor(player.position.x / CHUNK_SIZE);
  const ccz = Math.floor(player.position.z / CHUNK_SIZE);
  // キュー待ちの間に遠ざかったチャンクは破棄(再訪時に再キューされる)
  if (Math.abs(c.x - ccx) > CHUNK_RADIUS + 1 || Math.abs(c.z - ccz) > CHUNK_RADIUS + 1) {
    loadedChunks.delete(c.key);
    return;
  }
  generateChunk(c.x, c.z);
}

// ======= ANIMATION LOOP =======
const clock = new THREE.Clock();
let walkCycle = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.getElapsedTime();

  // 速度: 通常5m/s、最大3倍(15m/s)。スマホ=スティックの倒し量で連続加速、PC=Shiftダッシュ
  // 加速カーブを立たせ(pow0.7×1.15)、6割程度の倒しでも3倍近く出るように
  const joyMag = joyActive ? Math.min(1, Math.sqrt(joyOx*joyOx + joyOz*joyOz)) : 0;
  let speed = 5 + 40 * Math.min(1, Math.pow(joyMag, 0.7) * 1.15); // 最大45m/s
  if (keys['shift']) speed = 45;
  const forward = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const right   = new THREE.Vector3( Math.cos(camYaw), 0, -Math.sin(camYaw));

  let moveX = 0, moveZ = 0;
  let isMoving = false;

  // Keyboard
  if (keys['w'] || keys['arrowup'])    { moveX += forward.x; moveZ += forward.z; isMoving = true; }
  if (keys['s'] || keys['arrowdown'])  { moveX -= forward.x; moveZ -= forward.z; isMoving = true; }
  if (keys['a'] || keys['arrowleft'])  { moveX -= right.x;   moveZ -= right.z;   isMoving = true; }
  if (keys['d'] || keys['arrowright']) { moveX += right.x;   moveZ += right.z;   isMoving = true; }
  // Mouse keys for camera
  if (keys['q']) { camYaw += dt; }
  if (keys['e']) { camYaw -= dt; }

  // Joystick
  if (joyActive && (Math.abs(joyOx) > 0.1 || Math.abs(joyOz) > 0.1)) {
    moveX += forward.x * (-joyOz) + right.x * joyOx;
    moveZ += forward.z * (-joyOz) + right.z * joyOx;
    isMoving = true;
  }

  // Normalize
  const mLen = Math.sqrt(moveX*moveX + moveZ*moveZ);
  if (mLen > 0) { moveX /= mLen; moveZ /= mLen; }

  // Apply movement with collision
  const nx = player.position.x + moveX * speed * dt;
  const nz = player.position.z + moveZ * speed * dt;
  if (!wouldCollide(nx, player.position.z)) player.position.x = nx;
  if (!wouldCollide(player.position.x, nz)) player.position.z = nz;

  // ======= ジャンプ・重力・着地(地形と建物屋根の両方に整合) =======
  const floorY = floorHeightAt(player.position.x, player.position.z, player.position.y);
  // 空中でも再ジャンプ可能(連打で高度を稼げる)。押すたびに上向き速度をリセット
  if (hopQueued) { velY = 15.6; airborne = true; hopQueued = false; } // 到達高度 ≈ v²/2g ≈ 4.9m
  if (airborne) {
    velY += GRAVITY * dt;
    player.position.y += velY * dt;
    if (velY <= 0 && player.position.y <= floorY) {
      player.position.y = floorY; velY = 0; airborne = false;
    }
  } else {
    if (player.position.y - floorY > 1.5) {
      airborne = true; velY = 0; // 屋根や崖から歩き出た → 落下開始
    } else {
      player.position.y = floorY; // 接地中は床に追従
    }
  }

  // Face movement direction
  if (isMoving) {
    const targetAngle = Math.atan2(moveX, moveZ);
    let diff = targetAngle - player.rotation.y;
    while (diff >  Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    player.rotation.y += diff * 8 * dt;
  }

  // Walk animation
  if (isMoving) {
    walkCycle += dt * 5;
    leftArm.rotation.x  =  Math.sin(walkCycle) * 0.5;
    rightArm.rotation.x = -Math.sin(walkCycle) * 0.5;
  } else {
    leftArm.rotation.x  = 0;
    rightArm.rotation.x = 0;
  }

  // Orb pulse
  orbMat.emissiveIntensity = 1.2 + Math.sin(t*3)*0.5;
  orbLight.intensity = 1.0 + Math.sin(t*3)*0.4;

  // Camera
  if (viewMode === 1) {
    // First person
    scene.fog = WORLD_FOG;
    camera.position.set(
      player.position.x + Math.sin(player.rotation.y + Math.PI) * 0.1,
      player.position.y + 1.65,
      player.position.z + Math.cos(player.rotation.y + Math.PI) * 0.1
    );
    camera.rotation.order = 'YXZ';
    camera.rotation.y = camYaw + Math.PI;
    camera.rotation.x = -camPitch + 0.3;
  } else if (viewMode === 2) {
    // Overhead / top-down — disable fog so buildings are visible
    scene.fog = null;
    // プレイヤーの標高基準にしないと山岳部で地形がカメラより高くなる
    camera.position.set(player.position.x, player.position.y + 800, player.position.z + 0.001);
    camera.up.set(0, 0, -1);
    camera.lookAt(player.position.x, player.position.y, player.position.z);
    camera.up.set(0, 1, 0); // restore after lookAt
  } else {
    // Third person
    scene.fog = WORLD_FOG;
    const camX = player.position.x + Math.sin(camYaw) * camDist * Math.cos(camPitch);
    const camY = player.position.y + camHeight + camDist * Math.sin(camPitch);
    const camZ = player.position.z + Math.cos(camYaw) * camDist * Math.cos(camPitch);
    const idealCam = new THREE.Vector3(camX, camY, camZ);
    const safeCam = occlusionCamPos(idealCam, new THREE.Vector3(player.position.x, player.position.y + 1.5, player.position.z));
    camera.position.lerp(safeCam, 0.2);
    camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
  }

  // Station labels: billboard + ring spin
  for (const sl of stationLabels) {
    if (sl.type === 'label') {
      sl.mesh.quaternion.copy(camera.quaternion);
    } else if (sl.type === 'ring') {
      sl.mesh.rotation.y = t * 0.8;
      sl.mesh.rotation.x = Math.sin(t * 0.5) * 0.3;
    }
  }

  // Dynamic chunk streaming — generates buildings around player as they explore
  updateChunks();
  processChunkQueue(); // フレーム分割: 1チャンク/フレーム
  // タイル取得分の建物もフレーム分割(20棟/フレーム)で生成
  for (let n = 0; n < 20 && pendingBuildingIdx < pendingBuildings.length; n++) {
    const b = pendingBuildings[pendingBuildingIdx++];
    if (!isOnRoad(b.x, b.z, b.w, b.d)) addBuilding(b.x, b.z, b.w, b.d, b.h, b.style);
  }
  if (pendingBuildingIdx > 0 && pendingBuildingIdx === pendingBuildings.length) {
    pendingBuildings.length = 0; pendingBuildingIdx = 0;
  }
  // Tile-based OSM fetch — loads roads/buildings for newly entered areas
  checkOSMTiles();

  // 空・星・遠景地形をカメラ/プレイヤーに追従させる
  // (固定のままだと移動やマップジャンプで far クリップ外に出て「空が消える」)
  skyMesh.position.copy(camera.position);
  starMesh.position.copy(camera.position);
  updateFarMesh(); // 200mグリッドをまたいだ時だけ再サンプリング(それ以外は即return)

  renderer.render(scene, camera);
  drawMinimap();
  updateGPS(t);
}

animate();

// ======= RESIZE =======
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
